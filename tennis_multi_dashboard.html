<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tennis Multi-Strat v9</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0b0e14;
    --panel: #151a23;
    --panel-2: #1c222d;
    --border: #222a36;
    --muted: #6b7280;
    --text: #e5e7eb;
    --dim: #9ca3af;
    --accent: #3b82f6;
    --green: #10b981;
    --red: #ef4444;
    --amber: #f59e0b;
    --purple: #a78bfa;
    --cell: 86px;   /* per-variant column width */
    --rowh: 22px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 12px;
    font-size: 12px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .header h1 { font-size: 15px; font-weight: 600; margin: 0; }
  .meta { color: var(--dim); font-size: 11px; }
  .meta span + span::before { content: " · "; color: var(--muted); }

  /* Three-zone layout: chart on top, leaderboard middle, grid bottom. */
  .zone { background: var(--panel); border: 1px solid var(--border);
          border-radius: 6px; margin-bottom: 10px; padding: 10px; }
  .zone h2 { font-size: 11px; color: var(--dim); margin: 0 0 6px 0;
             text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
             display: flex; justify-content: space-between; align-items: center; }
  .zone h2 .controls { display: flex; gap: 6px; }
  .zone h2 button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    padding: 3px 8px; font-size: 10px; border-radius: 4px; cursor: pointer;
    text-transform: uppercase; letter-spacing: 0.3px; font-weight: 500;
  }
  .zone h2 button.active { border-color: var(--accent); color: var(--accent); }
  .zone h2 button:hover { background: var(--border); }
  #chartWrap { position: relative; height: 320px; }
  /* Leaderboard table */
  table.lb { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.lb th, table.lb td {
    padding: 4px 8px; text-align: right; border-bottom: 1px solid var(--border);
  }
  table.lb th { color: var(--dim); font-weight: 500; font-size: 10px;
                text-transform: uppercase; cursor: pointer; user-select: none; }
  table.lb th:hover { color: var(--text); }
  table.lb th.sorted { color: var(--accent); }
  table.lb td:first-child, table.lb th:first-child { text-align: left; }
  table.lb td.label { font-weight: 600; color: var(--text); font-family: monospace; }
  table.lb td.pnl-pos { color: var(--green); }
  table.lb td.pnl-neg { color: var(--red); }
  table.lb td.dim { color: var(--muted); }
  table.lb tr:hover { background: var(--panel-2); }
  table.lb td.desc { text-align: left; color: var(--dim); font-size: 11px;
                     max-width: 260px; overflow: hidden; text-overflow: ellipsis;
                     white-space: nowrap; }
  /* Element-grid (metrics as rows, variants as columns) */
  .gridwrap { overflow-x: auto; max-width: 100%; }
  table.eg { border-collapse: collapse; font-size: 11px; font-family: monospace; }
  table.eg th, table.eg td {
    padding: 3px 6px; border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    min-width: var(--cell); text-align: right; white-space: nowrap;
  }
  table.eg th.rowhead, table.eg td.rowhead {
    text-align: left; position: sticky; left: 0; background: var(--panel);
    border-right: 2px solid var(--border); color: var(--dim);
    min-width: 120px; font-weight: 500;
  }
  table.eg th.section {
    background: var(--panel-2); color: var(--purple);
    text-transform: uppercase; letter-spacing: 0.5px; font-size: 9px;
    border-bottom: 1px solid var(--border); padding: 5px 6px;
  }
  table.eg th.varhead {
    background: var(--panel-2); color: var(--text); font-weight: 600;
    font-size: 12px; cursor: pointer; user-select: none;
  }
  table.eg th.varhead.pinned { color: var(--accent); }
  table.eg td.num { color: var(--text); }
  table.eg td.pnl-pos { color: var(--green); font-weight: 600; }
  table.eg td.pnl-neg { color: var(--red); font-weight: 600; }
  table.eg td.on { color: var(--green); text-align: center; }
  table.eg td.off { color: var(--muted); text-align: center; }
  table.eg td.skip { color: var(--amber); font-size: 10px; }
  table.eg td.dim { color: var(--muted); }
  /* Live ticker */
  .ticker { font-family: monospace; font-size: 11px;
            max-height: 200px; overflow-y: auto; }
  .ticker .row { padding: 2px 0; border-bottom: 1px solid var(--border);
                 display: grid; grid-template-columns: 42px 54px 46px 54px 50px 1fr;
                 gap: 6px; align-items: center; }
  .ticker .row.closed .pnl-pos { color: var(--green); }
  .ticker .row.closed .pnl-neg { color: var(--red); }
  .ticker .row.open { color: var(--amber); }
  .ticker .row .var { font-weight: 600; color: var(--text); }
  .ticker .row .match { color: var(--dim); overflow: hidden;
                        text-overflow: ellipsis; white-space: nowrap; }
  .collapse-header { cursor: pointer; user-select: none; }
  .collapse-header::before { content: "▾ "; color: var(--dim); }
  .collapse-header.collapsed::before { content: "▸ "; }
  .collapsed-body { display: none; }
</style>
</head>

<body>
<div class="header">
  <h1>Tennis Multi-Strat <span id="version" style="color:var(--dim);font-weight:400">v9</span></h1>
  <div class="meta">
    <span id="elapsed">loading…</span>
    <span id="liveMatches"></span>
    <span id="signals"></span>
    <span id="pollStats"></span>
    <span id="lastUpdate" style="color:var(--muted)"></span>
  </div>
</div>

<!-- ZONE 1: PnL chart with mode toggle -->
<div class="zone">
  <h2>
    <span id="chartTitle">Cumulative PnL</span>
    <span class="controls">
      <button id="btnCum" class="active">Cumulative</button>
      <button id="btnEdge">Rolling edge/trade</button>
    </span>
  </h2>
  <div id="chartWrap"><canvas id="chart"></canvas></div>
</div>

<!-- ZONE 2: Leaderboard table -->
<div class="zone">
  <h2>Leaderboard <span style="color:var(--muted);font-weight:400">(click column to sort · click variant to pin-highlight on chart)</span></h2>
  <table class="lb" id="lbTable">
    <thead>
      <tr>
        <th data-sort="label">Variant</th>
        <th data-sort="total_pnl" class="sorted">PnL</th>
        <th data-sort="trades">n</th>
        <th data-sort="win_rate">WR%</th>
        <th data-sort="edge">Edge/tr</th>
        <th data-sort="open_bets">Open</th>
        <th data-sort="desc">Description</th>
      </tr>
    </thead>
    <tbody id="lbBody"></tbody>
  </table>
</div>

<!-- ZONE 3: Element grid (collapsible) -->
<div class="zone">
  <h2 class="collapse-header" id="gridToggle">Config / metrics grid (variants as columns)</h2>
  <div class="gridwrap" id="gridWrap">
    <table class="eg" id="gridTable"></table>
  </div>
</div>

<!-- ZONE 4: Live ticker (collapsible) -->
<div class="zone">
  <h2 class="collapse-header" id="tickerToggle">Live trade ticker (newest first)</h2>
  <div id="tickerBody" class="ticker"></div>
</div>

<script>
// ---------- State ----------
const state = {
  mode: 'cum',           // 'cum' or 'edge'
  sortBy: 'total_pnl',   // leaderboard sort column
  sortDir: 'desc',
  pinned: new Set(),     // variant labels pinned on chart
  pollMs: 5000,
  history: [],           // full history snapshots for edge-calc
  lastStats: null,       // last full payload
};

const PALETTE = [
  '#3b82f6','#10b981','#f59e0b','#ef4444','#a78bfa','#ec4899','#14b8a6',
  '#eab308','#f97316','#06b6d4','#8b5cf6','#84cc16','#f472b6','#60a5fa',
  '#34d399','#fb923c','#c084fc','#22d3ee','#fde047','#f87171',
];
function colorFor(label, idx){
  return PALETTE[idx % PALETTE.length];
}

// ---------- Chart ----------
let chart = null;
function initChart(){
  const ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: { datasets: [] },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: false, interaction: { mode: 'nearest', intersect: false },
      parsing: false,
      normalized: true,
      plugins: {
        legend: { display: true, position: 'bottom', align: 'center',
                  labels: { color: '#e5e7eb', boxWidth: 10, boxHeight: 10,
                            padding: 4, font: { size: 10, family: 'monospace' } }},
        tooltip: { bodyFont: { family: 'monospace' }, titleFont: { family: 'monospace' }}
      },
      scales: {
        x: { type: 'linear', title: { display: true, text: 'elapsed (min)', color: '#9ca3af' },
             ticks: { color: '#9ca3af' }, grid: { color: 'rgba(255,255,255,0.04)' }},
        y: { title: { display: true, text: '', color: '#9ca3af' },
             ticks: { color: '#9ca3af' }, grid: { color: 'rgba(255,255,255,0.06)' }}
      }
    }
  });
}

// Downsample a series of points to ≤maxPoints by striding.
function downsample(arr, maxPoints){
  if (arr.length <= maxPoints) return arr;
  const stride = Math.ceil(arr.length / maxPoints);
  const out = [];
  for (let i = 0; i < arr.length; i += stride) out.push(arr[i]);
  // Always keep the last point
  if (out[out.length - 1] !== arr[arr.length - 1]) out.push(arr[arr.length - 1]);
  return out;
}

function updateChart(payload){
  const strats = payload.strategies;
  const history = payload.history || [];
  const yTitle = state.mode === 'cum' ? 'cumulative PnL ($)' : '$ per minute (rolling 10m)';
  chart.options.scales.y.title.text = yTitle;
  const MAX_POINTS = 120;  // hard cap per series to keep chart snappy

  const datasets = strats.map((s, idx) => {
    const color = colorFor(s.label, idx);
    const isPinned = state.pinned.has(s.label);
    const anyPinned = state.pinned.size > 0;
    let pts = [];
    if (state.mode === 'cum'){
      for (const row of history){
        const v = row.pnl[s.label];
        if (v !== undefined) pts.push({x: row.t / 60, y: v});
      }
      pts.push({x: payload.elapsed_min, y: s.total_pnl});
    } else {
      // Rolling 10m $/min. Single pass instead of nested lookup.
      const windowSec = 600;
      let j = 0;  // pointer to earliest row within window
      for (let i = 0; i < history.length; i++){
        const row = history[i];
        while (j < i && (row.t - history[j].t) > windowSec) j++;
        const earlier = history[j];
        const dPnl = row.pnl[s.label] - (earlier.pnl[s.label] ?? 0);
        const dT = (row.t - earlier.t) / 60;
        if (dT > 0.1) pts.push({x: row.t / 60, y: dPnl / dT});
      }
    }
    pts = downsample(pts, MAX_POINTS);
    return {
      label: s.label,
      data: pts,
      borderColor: color,
      backgroundColor: color,
      borderWidth: isPinned ? 2.2 : 1,
      tension: 0.1,
      pointRadius: 0,
      pointHoverRadius: 3,
      hidden: anyPinned && !isPinned,
    };
  });
  chart.data.datasets = datasets;
  chart.update('none');
}

function setMode(m){
  state.mode = m;
  document.getElementById('btnCum').classList.toggle('active', m==='cum');
  document.getElementById('btnEdge').classList.toggle('active', m==='edge');
  document.getElementById('chartTitle').textContent =
    m==='cum' ? 'Cumulative PnL' : 'Rolling $/minute (10-min window)';
  if (state.lastStats) updateChart(state.lastStats);
}

document.getElementById('btnCum').onclick = () => setMode('cum');
document.getElementById('btnEdge').onclick = () => setMode('edge');

// ---------- Leaderboard ----------
function computeEdge(s){ return s.trades > 0 ? (s.total_pnl / s.trades) : 0; }
function fmtMoney(v){
  const s = v >= 0 ? '+' : '';
  return s + '$' + v.toFixed(2);
}
function fmtPct(v){ return v.toFixed(1) + '%'; }

function sortStrats(strats){
  const key = state.sortBy;
  const dir = state.sortDir === 'desc' ? -1 : 1;
  return strats.slice().sort((a,b) => {
    let av, bv;
    if (key === 'label'){ av = a.label; bv = b.label; }
    else if (key === 'edge'){ av = computeEdge(a); bv = computeEdge(b); }
    else if (key === 'desc'){ av = a.desc || ''; bv = b.desc || ''; }
    else { av = a[key]; bv = b[key]; }
    if (av < bv) return -1*dir;
    if (av > bv) return 1*dir;
    return 0;
  });
}

function renderLeaderboard(strats){
  const sorted = sortStrats(strats);
  const body = document.getElementById('lbBody');
  body.innerHTML = '';
  for (const s of sorted){
    const tr = document.createElement('tr');
    const edge = computeEdge(s);
    const pnlClass = s.total_pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
    const edgeClass = edge >= 0 ? 'pnl-pos' : 'pnl-neg';
    tr.innerHTML = `
      <td class="label" style="cursor:pointer">${s.label}${state.pinned.has(s.label) ? ' ★' : ''}</td>
      <td class="${pnlClass}">${fmtMoney(s.total_pnl)}</td>
      <td>${s.trades}</td>
      <td class="dim">${fmtPct(s.win_rate)}</td>
      <td class="${edgeClass}">${fmtMoney(edge)}</td>
      <td class="dim">${s.open_bets}</td>
      <td class="desc">${s.desc || ''}</td>
    `;
    tr.querySelector('.label').onclick = (e) => {
      e.stopPropagation();
      if (state.pinned.has(s.label)) state.pinned.delete(s.label);
      else state.pinned.add(s.label);
      if (state.lastStats){ updateChart(state.lastStats); renderLeaderboard(strats); renderGrid(strats); }
    };
    body.appendChild(tr);
  }
  // Mark sorted header
  document.querySelectorAll('#lbTable th').forEach(th => {
    th.classList.toggle('sorted', th.dataset.sort === state.sortBy);
  });
}

document.querySelectorAll('#lbTable th').forEach(th => {
  th.onclick = () => {
    const col = th.dataset.sort;
    if (state.sortBy === col){
      state.sortDir = state.sortDir === 'desc' ? 'asc' : 'desc';
    } else {
      state.sortBy = col;
      state.sortDir = (col === 'label' || col === 'desc') ? 'asc' : 'desc';
    }
    if (state.lastStats) renderLeaderboard(state.lastStats.strategies);
  };
});

// ---------- Element grid ----------
// Rows defined declaratively. Each row: {section?, label, get: (s) => value, fmt?: (v) => str, cls?: (v,s) => className}
const GRID_ROWS = [
  { section: 'Performance' },
  { label: 'PnL', get: s => s.total_pnl,
    fmt: v => fmtMoney(v),
    cls: v => v >= 0 ? 'pnl-pos' : 'pnl-neg' },
  { label: 'Trades', get: s => s.trades, fmt: v => String(v), cls: () => 'num' },
  { label: 'Win / Loss', get: s => s.winning + '/' + s.losing, fmt: v => v, cls: () => 'num' },
  { label: 'Win rate', get: s => s.win_rate, fmt: v => fmtPct(v), cls: () => 'dim' },
  { label: 'Edge/trade', get: s => computeEdge(s),
    fmt: v => fmtMoney(v),
    cls: v => v >= 0 ? 'pnl-pos' : 'pnl-neg' },
  { label: 'Open bets', get: s => s.open_bets, fmt: v => String(v), cls: () => 'dim' },
  { label: 'Commission', get: s => s.total_commission,
    fmt: v => '-$' + Math.abs(v).toFixed(2), cls: () => 'dim' },
  { section: 'Entry filters' },
  { label: 'blocked_tier', get: s => s.entries_blocked_tier || 0, fmt: v => String(v), cls: () => 'dim' },
  { label: 'blocked_odds_band', get: s => s.entries_blocked_odds_band || 0, fmt: v => String(v), cls: () => 'dim' },
  { label: 'blocked_entry_state', get: s => s.entries_blocked_entry_state || 0, fmt: v => String(v), cls: () => 'dim' },
  { label: 'blocked_doubles', get: s => s.entries_blocked_doubles || 0, fmt: v => String(v), cls: () => 'dim' },
  { label: 'blocked_lay', get: s => s.entries_blocked_lay || 0, fmt: v => String(v), cls: () => 'dim' },
  { label: 'blocked_loss_streak', get: s => s.entries_blocked_loss_streak || 0, fmt: v => String(v), cls: () => 'dim' },
  { section: 'Pressure telemetry' },
  { label: 'passed_pressure', get: s => s.entries_passed_pressure || 0, fmt: v => v > 0 ? String(v) : '—', cls: v => v > 0 ? 'num' : 'off' },
  { label: 'blocked_pressure', get: s => s.entries_blocked_pressure || 0, fmt: v => v > 0 ? String(v) : '—', cls: v => v > 0 ? 'num' : 'off' },
  { label: 'blocked_no_pressure', get: s => s.entries_blocked_no_pressure || 0, fmt: v => v > 0 ? String(v) : '—', cls: v => v > 0 ? 'num' : 'off' },
  { label: 'pressure_unknown', get: s => s.entries_pressure_unknown || 0, fmt: v => v > 0 ? String(v) : '—', cls: v => v > 0 ? 'dim' : 'off' },
  { section: 'Config' },
  { label: 'Stake', get: s => s.stake_amount, fmt: v => '$' + Number(v).toFixed(0), cls: () => 'num' },
  { label: 'Hard cap', get: s => s.hard_cap_dollars,
    fmt: v => v ? '$' + Number(v).toFixed(2) : 'OFF',
    cls: v => v ? 'num' : 'off' },
];

function renderGrid(strats){
  const tbl = document.getElementById('gridTable');
  // Header: row label col + one th per variant
  let html = '<thead><tr><th class="rowhead">&nbsp;</th>';
  strats.forEach((s, i) => {
    const pinned = state.pinned.has(s.label);
    const color = colorFor(s.label, i);
    html += `<th class="varhead ${pinned ? 'pinned' : ''}" data-label="${s.label}" title="${s.desc}">
              <span style="display:inline-block;width:8px;height:8px;background:${color};border-radius:50%;margin-right:4px;vertical-align:middle"></span>
              ${s.label}${pinned ? ' ★' : ''}
            </th>`;
  });
  html += '</tr></thead><tbody>';
  for (const row of GRID_ROWS){
    if (row.section){
      html += `<tr><th class="section" colspan="${strats.length + 1}">${row.section}</th></tr>`;
      continue;
    }
    html += `<tr><td class="rowhead">${row.label}</td>`;
    for (const s of strats){
      const v = row.get(s);
      const cls = row.cls ? row.cls(v, s) : 'num';
      const txt = row.fmt ? row.fmt(v) : String(v);
      html += `<td class="${cls}">${txt}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody>';
  tbl.innerHTML = html;
  // Hook variant headers to toggle pin
  tbl.querySelectorAll('th.varhead').forEach(th => {
    th.onclick = () => {
      const lbl = th.dataset.label;
      if (state.pinned.has(lbl)) state.pinned.delete(lbl);
      else state.pinned.add(lbl);
      if (state.lastStats){ updateChart(state.lastStats); renderLeaderboard(state.lastStats.strategies); renderGrid(strats); }
    };
  });
}

// ---------- Ticker ----------
function renderTicker(strats){
  // Flatten all bets across variants; tag with variant; sort by entry_ts desc; show top 50.
  const rows = [];
  for (const s of strats){
    for (const b of (s.bets || [])){
      rows.push({...b, variant: s.label});
    }
  }
  rows.sort((a, b) => (b.entry_ts || 0) - (a.entry_ts || 0));
  const tbody = document.getElementById('tickerBody');
  const top = rows.slice(0, 50);
  if (top.length === 0){ tbody.innerHTML = '<div style="color:var(--muted);padding:6px">No trades yet.</div>'; return; }
  let html = '';
  for (const r of top){
    const closed = r.closed;
    const pnlCls = (r.pnl != null) ? (r.pnl >= 0 ? 'pnl-pos' : 'pnl-neg') : '';
    const pnlStr = (r.pnl != null) ? fmtMoney(r.pnl) : 'open';
    html += `<div class="row ${closed ? 'closed' : 'open'}">
      <div class="var">${r.variant}</div>
      <div>${r.type.toUpperCase()}</div>
      <div>${Number(r.odds).toFixed(2)}</div>
      <div>${r.exit_odds ? Number(r.exit_odds).toFixed(2) : '—'}</div>
      <div class="${pnlCls}">${pnlStr}</div>
      <div class="match">${r.player} · ${r.match || ''} · ${r.reason || ''}</div>
    </div>`;
  }
  tbody.innerHTML = html;
}

// ---------- Collapse toggles ----------
function bindCollapse(headerId, bodyId){
  const h = document.getElementById(headerId);
  const b = document.getElementById(bodyId);
  h.onclick = () => {
    h.classList.toggle('collapsed');
    b.classList.toggle('collapsed-body');
  };
}
bindCollapse('gridToggle', 'gridWrap');
bindCollapse('tickerToggle', 'tickerBody');

// ---------- Bootstrap ----------
initChart();

async function poll(){
  try {
    const r = await fetch('/api', {cache:'no-store'});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    state.lastStats = data;
    // Header meta
    document.getElementById('elapsed').textContent = 'Elapsed: ' + (data.elapsed_min/60).toFixed(2) + 'h (' + data.elapsed_min.toFixed(0) + 'm)';
    document.getElementById('liveMatches').textContent = 'Live: ' + (data.feed?.live_matches ?? '?');
    const sigs = data.strategies[0]?.signals_detected ?? 0;
    document.getElementById('signals').textContent = 'Signals: ' + sigs;
    document.getElementById('pollStats').textContent = 'Strategies: ' + data.strategies.length;
    document.getElementById('lastUpdate').textContent = 'Updated: ' + new Date().toLocaleTimeString();
    updateChart(data);
    renderLeaderboard(data.strategies);
    renderGrid(data.strategies);
    renderTicker(data.strategies);
  } catch (e){
    document.getElementById('lastUpdate').textContent = 'ERR: ' + e.message;
  }
}
poll();
setInterval(poll, state.pollMs);
</script>
</body>
</html>
